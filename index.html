// ─── RESPONSIVE HOOK ─────────────────────────────────────────────────────────
// Three-tier system tuned for real devices:
//   mobile   < 768   — iPhone SE/12/13/14/15(+ Pro/Max), Galaxy S/Note in portrait
//   tablet   768–1023 — iPad mini/Air/Pro & Android tablets in portrait
//   desktop  ≥ 1024  — iPad landscape (incl. 12.9" portrait), laptops, monitors
// Nav stays compact (hamburger) through tablet-portrait widths since a full
// horizontal nav doesn't reliably fit 768–1023px; layout richness (columns,
// image sizes) still scales up for tablet via isTablet/width.
function useBreakpoint() {
  const getWidth = () => (typeof window !== "undefined" ? window.innerWidth : 1280);
  const [width, setWidth] = useState(getWidth);
  useEffect(() => {
    const onResize = () => setWidth(getWidth());
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return () => {
      window.removeEventListener("resize", onResize);
      window.removeEventListener("orientationchange", onResize);
    };
  }, []);
  return {
    width,
    isMobile: width < 768,
    isTablet: width >= 768 && width < 1024,
    isDesktop: width >= 1024,
    isCompactNav: width < 1024,
  };
}

// ─── GALLERY ──────────────────────────────────────────────────────────────────
function Gallery({ t, bp }) {
  const { isMobile, isTablet } = bp;
  const [lightbox, setLightbox] = useState(null);
  const images = [
    {src:"uploads/images-1777280628644.jpg", bg:"center/cover"},
    {src:"uploads/_DSF4737.jpg",             bg:"center 30%/cover"},
    {src:"uploads/_DSF4778.jpg",             bg:"center/cover"},
  ];
  const placeholders = [
    {bg:`linear-gradient(135deg, ${t.bg2} 0%, ${t.accentLight} 100%)`},
    {bg:`linear-gradient(135deg, ${t.accentLight} 0%, ${t.bg2} 100%)`},
  ];

  const allItems = [
    ...images.map(img=>({bgStyle:`url('${img.src}') ${img.bg}`, imgSrc:img.src})),
    ...placeholders.map(p=>({bgStyle:p.bg, imgSrc:null})),
  ];

  useEffect(()=>{
    const onKey = e=>{ if(e.key==="Escape") setLightbox(null); };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  },[]);

  const compactGrid = isMobile || isTablet;
  return (
    <section id="גלריה" style={{background:t.sectionAlt||t.bg2,padding: isMobile?"70px 6%":isTablet?"80px 6%":"100px 8%"}}>
      <div style={{textAlign:"center",marginBottom: isMobile?40:60}}>
        <p style={{fontSize:13,color:t.sectionAltText?t.accentLight:t.accent,fontWeight:600,letterSpacing:"0.1em",marginBottom:14,fontFamily:t.bodyFont,textTransform:"uppercase"}}>גלריה</p>
        <h2 style={{fontFamily:t.headingFont,fontSize:"clamp(28px,3vw,44px)",fontWeight:700,color:t.sectionAltText||t.text}}>מהקליניקה שלי</h2>
      </div>

      <div style={{
        display:"grid",
        gridTemplateColumns: compactGrid?"1fr 1fr":"2fr 1fr 1fr",
        gridTemplateRows: isMobile?"180px 180px 180px":isTablet?"240px 240px 240px":"280px 280px",
        gap: isMobile?10:isTablet?14:16,
        maxWidth:1100, margin:"0 auto"
      }}>
        {allItems.map((item,i)=>(
          <div key={i}
            onClick={()=>item.imgSrc && setLightbox(item.imgSrc)}
            style={{
              background:item.bgStyle,
              borderRadius: t.btnStyle==="square"?"8px":"12px",
              gridColumn: i===0?(compactGrid?"1 / 3":"1"):"auto",
              gridRow: i===0?(compactGrid?"1":"1 / 3"):"auto",
              overflow:"hidden", position:"relative",
              cursor: item.imgSrc?"pointer":"default"
            }}>
            {item.imgSrc && (
              <div style={{
                position:"absolute",inset:0,
                background:"rgba(0,0,0,0)",
                transition:"background 0.25s",
                display:"flex",alignItems:"center",justifyContent:"center"
              }}
              onMouseOver={e=>e.currentTarget.style.background="rgba(0,0,0,0.25)"}
              onMouseOut={e=>e.currentTarget.style.background="rgba(0,0,0,0)"}
              >
                <div style={{
                  width:44,height:44,borderRadius:"50%",
                  background:"rgba(255,255,255,0.85)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  opacity:0,transition:"opacity 0.25s",fontSize:20
                }}
                onMouseOver={e=>{e.currentTarget.style.opacity=1}}
                onMouseOut={e=>{e.currentTarget.style.opacity=0}}
                >🔍</div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{
          position:"fixed",inset:0,zIndex:1000,
          background:"rgba(0,0,0,0.92)",
          display:"flex",alignItems:"center",justifyContent:"center",
          animation:"fadeIn 0.2s ease"
        }}>
          <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
          <button onClick={()=>setLightbox(null)} style={{
            position:"absolute",top:24,left:24,
            width:44,height:44,borderRadius:"50%",
            background:"rgba(255,255,255,0.15)",border:"none",
            color:"#fff",fontSize:22,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",
            backdropFilter:"blur(4px)",transition:"background 0.2s"
          }}
          onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.3)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
          >✕</button>
          <img src={lightbox}
            onClick={e=>e.stopPropagation()}
            style={{
              maxWidth:"90vw", maxHeight:"90vh",
              objectFit:"contain",
              borderRadius:8,
              boxShadow:"0 24px 80px rgba(0,0,0,0.6)"
            }}
          />
        </div>
      )}
    </section>
  );
}

// ─── CONTACT ──────────────────────────────────────────────────────────────────
function Contact({ t, bp }) {
  const { isMobile, isTablet, width } = bp;

  // narrower tablet-portrait widths stack instead of squeezing the inputs.
  const stacked = isMobile || width < 900;
  const [form, setForm] = useState({name:"",phone:"",service:"",msg:""});
  const [sent, setSent] = useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setSent(true);
  }

  return (
    <section id="צור קשר" style={{background:t.bg,padding: isMobile?"70px 6%":isTablet?"80px 6%":"100px 8%"}}>

        {/* Info */}

          <h2 style={{fontFamily:t.headingFont,fontSize:"clamp(28px,3vw,42px)",fontWeight:700,color:t.text,lineHeight:1.25,marginBottom:24}}>

          </h2>
          <p style={{fontSize:16,color:t.textMid,lineHeight:1.8,marginBottom:40,fontFamily:t.bodyFont}}>
            השאירו פרטים ואחזור אליכם בהקדם לקביעת התור הראשון.
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            {[
              {icon:"📞",text:"052-7029010",href:"tel:0527029010"},
              {icon:"📍",text:"ברכה צפירה 3 (מגדלי מקס), עכו",href:"https://waze.com/ul?q=ברכה%20צפירה%203%20עכו&navigate=yes"}
            ].map(({icon,text,href})=>(
              <a key={text} href={href} target={href.startsWith("http")?"_blank":undefined} rel="noopener noreferrer"
                 style={{display:"flex",alignItems:"center",gap:16,textDecoration:"none",cursor:"pointer",transition:"transform 0.2s"}}
                 onMouseOver={e=>{e.currentTarget.style.transform="translateX(-4px)"}}
                 onMouseOut={e=>{e.currentTarget.style.transform="translateX(0)"}}>
                <div style={{
                  width:44,height:44,borderRadius:"50%",background:t.accentLight,

              </a>
            ))}
          </div>
        </div>

        {/* Form */}
        <div style={{
          background:t.cardBg, border:`1px solid ${t.cardBorder}`,

          padding: isMobile?"32px 24px":"44px 40px",
          boxShadow:"0 4px 24px rgba(0,0,0,0.06)"
        }}>
          {sent ? (
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:48,marginBottom:20}}>✅</div>
              <h3 style={{fontFamily:t.headingFont,fontSize:24,color:t.text,marginBottom:12}}>תודה!</h3>
              <p style={{fontFamily:t.bodyFont,color:t.textMid}}>קיבלתי את הפנייה שלך ואחזור בהקדם.</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:18}}>

                {label:"שם מלא",key:"name",type:"text",placeholder:"הכנס שם מלא"},
                {label:"טלפון",key:"phone",type:"tel",placeholder:"050-0000000"},
              ].map(({label,key,type,placeholder})=>(
                <div key={key}>
                  <label style={{display:"block",fontSize:13,color:t.textMid,marginBottom:6,fontFamily:t.bodyFont,fontWeight:500}}>{label}</label>

                      width:"100%",padding:"12px 16px",
                      border:`1px solid ${t.cardBorder}`,

                  style={{
                    width:"100%",padding:"12px 16px",
                    border:`1px solid ${t.cardBorder}`,
                    borderRadius: t.btnStyle==="square"?"6px":"8px",

              <button type="submit" style={{

                padding:"14px",
                borderRadius: t.btnStyle==="pill"?"50px": t.btnStyle==="square"?"6px":"50px",
                fontSize:16,fontFamily:t.bodyFont,fontWeight:600,
                cursor:"pointer",marginTop:4,
                boxShadow:`0 4px 16px ${t.accent}55`,
                transition:"transform 0.2s, box-shadow 0.2s"
              }}
              onMouseOver={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow=`0 8px 24px ${t.accent}66`}}
              onMouseOut={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow=`0 4px 16px ${t.accent}55`}}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.variant] || THEMES.A;
  const [scrolled, setScrolled] = useState(false);
  const bp = useBreakpoint();

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div style={{background:t.bg}}>
      <style>{`
        @keyframes scrollPulse {
          0%,100%{opacity:0.3;transform:scaleY(0.8)}
          50%{opacity:0.8;transform:scaleY(1.2)}
        }
        ::selection { background: ${t.accentLight}; color: ${t.text}; }
        * { scrollbar-width: thin; scrollbar-color: ${t.accentLight} transparent; }
        @media (max-width: 1023px) {
          body { font-size: 15px; }
        }
      `}</style>

      <Nav t={t} scrolled={scrolled} bp={bp}/>
      <Hero t={t} fullHeight={tweaks.heroFullHeight} bp={bp}/>
      <About t={t} bp={bp}/>
      <Services t={t} bp={bp}/>
      <Testimonials t={t} bp={bp}/>
      {tweaks.showGallery && <Gallery t={t} bp={bp}/>}
      <Contact t={t} bp={bp}/>
      <Footer t={t} bp={bp}/>

      <TweaksPanel>
        <TweakSection label="סגנון עיצוב"/>
        <TweakRadio label="וריאנט" value={tweaks.variant} options={["A","B","C"]} onChange={v=>setTweak("variant",v)}/>
        <TweakSection label="הירו"/>
        <TweakToggle label="גובה מלא (100vh)" value={tweaks.heroFullHeight} onChange={v=>setTweak("heroFullHeight",v)}/>
        <TweakSection label="סקשנים"/>
        <TweakToggle label="הצג גלריה" value={tweaks.showGallery} onChange={v=>setTweak("showGallery",v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
